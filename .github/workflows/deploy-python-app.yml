name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (for local lint/syntax check)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (syntax check only)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports cleanly
        env:
          OPENAI_API_KEY: dummy-for-import-check
        run: |
          python -c "from app.main import app; print('✅ App imports OK')"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "📦 Pulling latest code..."
            cd ${{ secrets.VPS_APP_DIR }}
            git pull origin master

            echo "📦 Installing/updating Python dependencies..."
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "🔄 Restarting service..."
            sudo systemctl restart ${{ secrets.VPS_SERVICE_NAME }}

            echo "🩺 Checking service health..."
            sleep 3
            sudo systemctl is-active ${{ secrets.VPS_SERVICE_NAME }} && echo "✅ Service is running" || (echo "❌ Service failed to start" && sudo journalctl -u ${{ secrets.VPS_SERVICE_NAME }} --no-pager -n 30 && exit 1)

      - name: Smoke test — health endpoint
        run: |
          echo "🌐 Hitting health endpoint..."
          curl -sf https://${{ secrets.VPS_HOST }}/health && echo "✅ Health check passed" || echo "⚠️ Health check failed (non-fatal)"
        continue-on-error: true
