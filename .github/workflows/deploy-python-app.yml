name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - master

jobs:
  # ── Job 1: syntax check runs on GitHub's cloud runner ──────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports cleanly
        env:
          OPENAI_API_KEY: dummy-for-import-check
        run: |
          python -c "from app.main import app; print('✅ App imports OK')"

  # ── Job 2: deploy runs ON the VPS (self-hosted runner) ─────────────────────
  # No inbound SSH needed — the runner polls GitHub from the VPS.
  deploy:
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Pull latest code
        run: |
          cd ${{ secrets.VPS_APP_DIR }}
          git pull origin master

      - name: Install/update Python dependencies
        run: |
          cd ${{ secrets.VPS_APP_DIR }}
          source venv/bin/activate
          pip install -r requirements.txt --quiet

      - name: Restart service
        run: |
          sudo systemctl restart ${{ secrets.VPS_SERVICE_NAME }}

      - name: Verify service is running
        run: |
          sleep 3
          sudo systemctl is-active ${{ secrets.VPS_SERVICE_NAME }} \
            && echo "✅ Service is running" \
            || (sudo journalctl -u ${{ secrets.VPS_SERVICE_NAME }} --no-pager -n 30 && exit 1)

      - name: Smoke test health endpoint
        run: |
          curl -sf https://api.vantrade.in/health \
            && echo "✅ Health check passed" \
            || echo "⚠️ Health check failed (non-fatal)"
        continue-on-error: true
