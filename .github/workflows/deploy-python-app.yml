name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - master

jobs:
  # ── Job 1: syntax check runs on GitHub's cloud runner ──────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports cleanly
        env:
          OPENAI_API_KEY: dummy-for-import-check
        run: |
          python -c "from app.main import app; print('✅ App imports OK')"

  # ── Job 2: deploy via SSH from GitHub's cloud runner ───────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_PRODUCTION }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL_PRODUCTION }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: OPENAI_API_KEY,FRONTEND_URL
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            git pull origin master
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # ── Write env vars from GitHub Secrets into .env ─────────────────
            echo "🔑 Updating .env with secrets from GitHub..."
            sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=$OPENAI_API_KEY|" .env
            # Add or update FRONTEND_URL
            if grep -q "^FRONTEND_URL=" .env; then
              sed -i "s|^FRONTEND_URL=.*|FRONTEND_URL=$FRONTEND_URL|" .env
            else
              echo "FRONTEND_URL=$FRONTEND_URL" >> .env
            fi
            echo "✅ .env updated"

            # ── Remove hardcoded env vars from systemd service file ──────────
            # systemd Environment= lines take priority over .env — strip them
            # so the app always reads secrets from .env (updated above)
            SERVICE_FILE="/etc/systemd/system/${{ secrets.VPS_SERVICE_NAME }}.service"
            if sudo grep -q "OPENAI_API_KEY" "$SERVICE_FILE" 2>/dev/null; then
              echo "🔧 Removing OPENAI_API_KEY from systemd service file..."
              sudo sed -i '/OPENAI_API_KEY/d' "$SERVICE_FILE"
              sudo systemctl daemon-reload
              echo "✅ Systemd service file cleaned"
            fi

            # ── Run pending database migrations ─────────────────────────────
            echo "🗄️  Running database migrations..."
            python run_migration.py add_daily_pnl_records \
              && echo "✅ add_daily_pnl_records migration done" \
              || echo "⚠️  add_daily_pnl_records already applied or skipped (non-fatal)"

            # ── Enforce single worker ────────────────────────────────────────
            # The autonomous trading agent manager is in-memory state.
            # Multiple uvicorn workers = multiple separate managers = duplicate
            # agents for the same user. Must run with exactly 1 worker.
            SERVICE_FILE="/etc/systemd/system/${{ secrets.VPS_SERVICE_NAME }}.service"
            if grep -q "\-\-workers [2-9]" "$SERVICE_FILE" 2>/dev/null; then
              echo "⚠️  Fixing --workers to 1 in service file (multi-worker causes duplicate agents)"
              sudo sed -i 's/--workers [0-9]*/--workers 1/g' "$SERVICE_FILE"
              sudo systemctl daemon-reload
              echo "✅ Service file updated"
            fi

            sudo systemctl restart ${{ secrets.VPS_SERVICE_NAME }}
            sleep 3
            sudo systemctl is-active ${{ secrets.VPS_SERVICE_NAME }} \
              && echo "✅ Service is running" \
              || (sudo journalctl -u ${{ secrets.VPS_SERVICE_NAME }} --no-pager -n 30 && exit 1)

      - name: Smoke test health endpoint
        run: |
          sleep 5
          curl -sf https://api.vantrade.in/health \
            && echo "✅ Health check passed" \
            || echo "⚠️ Health check failed (non-fatal)"
        continue-on-error: true
